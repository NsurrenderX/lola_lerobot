description: This is an example configuration file for submitting jobs to Bonete
env_defaults:
  NODES: 1 # The number of nodes you want to use
  GPUS: 2 # number of gpus per node
  JOB_NAME: bonete-test-bonete

target:
  service: volcano # sing for singularity, no need to change
  queue: bonete81

environment: # select the image, clone your code, install the packages
  registry: nvcr.io
  image: nvidia/cuda:12.8.1-cudnn-devel-ubuntu22.04
  setup:
    - apt-get update
    - DEBIAN_FRONTEND=noninteractive apt-get install -y git wget curl rsync ca-certificates
    - git clone https://github.com/NsurrenderX/lola_lerobot.git && cd lola_lerobot
    - wget https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh -O /tmp/miniforge.sh
    - bash /tmp/miniforge.sh -b -p /opt/conda
    - rm /tmp/miniforge.sh
    - export PATH="/opt/conda/bin:$$PATH"
    - conda create -n lerobot python==3.12 -y
    - conda run --name lerobot conda install ffmpeg==7.1.1 -c conda-forge -y
    # Set LD_LIBRARY_PATH so torchcodec can find ffmpeg shared libs (libavutil.so etc.)
    # Also prefer conda's newer libstdc++ over the system's older version (CXXABI_1.3.15)
    - conda run --name lerobot bash -c 'mkdir -p $CONDA_PREFIX/etc/conda/activate.d && echo "export LD_LIBRARY_PATH=\$CONDA_PREFIX/lib:\${LD_LIBRARY_PATH:-}" > $CONDA_PREFIX/etc/conda/activate.d/env_vars.sh'
    # Step 1: Install lerobot normally to get ALL deps (including serial, pyserial, etc.)
    - conda run --name lerobot pip install -e ".[pi]"
    # Step 2: Force-reinstall torch cu128 to override nvidia-* CUDA runtime libs from 12.6.x → 12.8.x
    # Blackwell B200 requires sm_100 kernels only in 12.8.x, not 12.6.x
    # torch 2.10 + torchcodec 0.10 (version-matched per torchcodec compatibility table)
    - conda run --name lerobot pip install --force-reinstall torch==2.10 torchvision==0.25 torchcodec==0.10 --index-url https://download.pytorch.org/whl/cu128
    # Step 3: Override specific packages that must be pinned
    # numpy 1.26.4 required — numpy 2.x has known torch.from_numpy buffer protocol issues on B200
    # Python 3.12 required — numpy 1.26.4 only supports up to Python 3.12 
    - conda run --name lerobot pip install --force-reinstall transformers==5.2.0 diffusers==0.37.0
    - conda run --name lerobot pip install datasets==4.1.1
    - conda run --name lerobot pip install accelerate pytest deepspeed polars pytorch_lightning
    - conda run --name lerobot pip install --force-reinstall numpy==1.26.4
    - conda clean -afy

code:
  local_dir: $CONFIG_DIR/

data:
  storage_id: my_output

jobs:

  - name: $JOB_NAME # the job name you will see on the portal. Though not important, you'd better carefully set it for clarity.
    sku: ${NODES}xG${GPUS} # determinate the GPU you will use, please refer to the official docs for more information 
    process_count_per_node: 1 # usually 1

    submit_args:
      env:
        AMLT_PERSISTENT_VOLUME_NAME: pvc-vast-bonete81
        AMLT_PERSISTENT_VOLUME_MOUNT_DIR: /mnt/pvc
        MASTER_PORT: "45667"
        AMLT_CPU_REQUEST_RATIO: 0.10417
        AMLT_MEMORY_REQUEST_RATIO: 1
      container_args:
        cpus: 20
        memory: 1404GI

    command:
      - nvidia-smi
      - cd /mnt/pvc
      - echo "hello world"
      - ls
      - cd && cd lola_lerobot
      - which conda
      - which python
      - conda run --name lerobot python -c "import sys; print(sys.executable)"
      - conda run --name lerobot which python
      - conda run --name lerobot which torchrun
      - cd && cd lola_lerobot
      - >-
        bash src/lerobot/scripts/test_azure_stream.sh --nnodes $NODES --nproc_per_node $GPUS --node_rank $$AZUREML_CR_NODE_RANK --master_addr $$AZ_BATCHAI_JOB_MASTER_NODE_IP --master_port 9901 
        --batch_size 64 --train_vlm --pretrain --temp_process 
        --dataset_root /mnt/pvc/training_data/lerobot_v30/merged_0422_sub1 --vlm_path /mnt/pvc/training_data/weights/Qwen3.5-4B 
        --ckpt_dir /mnt/pvc/training_data/checkpoints/ --fsdp_sharding "shard_grad_op"  --disable_gradient_checkpointing 
        --max_history_length 1024
      - echo "Hello"